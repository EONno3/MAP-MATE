# Mapmate - Docker Compose Configuration
# 실행: docker-compose up -d
# 종료: docker-compose down

services:
  # Backend AI Service (FastAPI)
  backend:
    build:
      context: ./packages/backend-ai
      dockerfile: Dockerfile
    container_name: mapmate-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - mapmate-network

  # Frontend (React + Nginx)
  frontend:
    build:
      context: ./packages/frontend
      dockerfile: Dockerfile
    container_name: mapmate-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - mapmate-network

networks:
  mapmate-network:
    driver: bridge


