<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Metroidvania Map Visualization</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a;
            color: #fff;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #fff;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
        }
        .map-container {
            background: #000;
            border: 2px solid #444;
            border-radius: 8px;
            padding: 20px;
            overflow: auto;
            margin-bottom: 30px;
        }
        svg {
            display: block;
            margin: 0 auto;
        }
        .room {
            stroke: #666;
            stroke-width: 1;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .room:hover {
            opacity: 0.8;
            stroke: #fff;
            stroke-width: 2;
        }
        .connection {
            stroke: #444;
            stroke-width: 2;
            fill: none;
        }
        .connection.gated {
            stroke: #ff6b6b;
            stroke-dasharray: 5,5;
            stroke-width: 2;
        }
        .room-label {
            font-size: 10px;
            fill: #fff;
            text-anchor: middle;
            pointer-events: none;
        }
        .legend {
            background: #222;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .legend h3 {
            margin-top: 0;
            color: #fff;
        }
        .legend-item {
            display: inline-block;
            margin-right: 20px;
            margin-bottom: 10px;
        }
        .legend-color {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 1px solid #666;
            margin-right: 5px;
            vertical-align: middle;
        }
        .stats {
            background: #222;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        .stat-box {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 5px;
            border-left: 3px solid #4CAF50;
        }
        .stat-label {
            color: #888;
            font-size: 12px;
            text-transform: uppercase;
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            margin-top: 5px;
        }
        .tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid #666;
            border-radius: 5px;
            padding: 10px;
            pointer-events: none;
            display: none;
            max-width: 300px;
            z-index: 1000;
        }
        .tooltip-title {
            font-weight: bold;
            color: #4CAF50;
            margin-bottom: 5px;
        }
        .tooltip-detail {
            font-size: 12px;
            color: #ccc;
            margin: 2px 0;
        }
    </style>
</head>

    <div id="tooltip" class="tooltip"></div>
    
    <script>
        const rooms = document.querySelectorAll('.room');
        const tooltip = document.getElementById('tooltip');
        
        rooms.forEach(room => {
            room.addEventListener('mouseenter', (e) => {
                const info = room.dataset.info.split('|');
                tooltip.innerHTML = `
                    <div class="tooltip-title">${info[0]}</div>
                    <div class="tooltip-detail">${info[1]}</div>
                    <div class="tooltip-detail">${info[2]}</div>
                `;
                tooltip.style.display = 'block';
            });
            
            room.addEventListener('mousemove', (e) => {
                tooltip.style.left = (e.pageX + 10) + 'px';
                tooltip.style.top = (e.pageY + 10) + 'px';
            });
            
            room.addEventListener('mouseleave', () => {
                tooltip.style.display = 'none';
            });
        });
    </script>
