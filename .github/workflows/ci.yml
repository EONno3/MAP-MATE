name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  backend-api:
    name: Backend API Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: mapmate
          POSTGRES_PASSWORD: mapmate
          POSTGRES_DB: mapmate
        ports:
          - 15432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm -C packages/backend-api exec prisma generate

      - name: Run Prisma migrations
        run: pnpm -C packages/backend-api exec prisma db push
        env:
          DATABASE_URL: postgresql://mapmate:mapmate@localhost:15432/mapmate?schema=public

      - name: Run tests
        run: pnpm -C packages/backend-api test
        env:
          DATABASE_URL: postgresql://mapmate:mapmate@localhost:15432/mapmate?schema=public
          JWT_SECRET: test-secret-key-for-ci

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./packages/backend-api/coverage/lcov.info
          flags: backend-api
          name: backend-api-coverage

  backend-ai:
    name: Backend AI Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: packages/backend-ai/requirements.txt

      - name: Install dependencies
        run: |
          cd packages/backend-ai
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          cd packages/backend-ai
          pytest --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./packages/backend-ai/coverage.xml
          flags: backend-ai
          name: backend-ai-coverage

  frontend:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm -C packages/frontend type-check

      - name: Lint
        run: pnpm -C packages/frontend lint

      - name: Format check
        run: pnpm -C packages/frontend format:check

      - name: Build
        run: pnpm -C packages/frontend build
        env:
          VITE_API_URL: http://localhost:3000

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: packages/frontend/dist
          retention-days: 7



