name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  # backend-api: WIP 패키지(Prisma/DB 미구현) - 추후 구현 시 CI 추가 예정

  backend-ai:
    name: Backend AI Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: packages/backend-ai/requirements.txt

      - name: Install dependencies
        run: |
          cd packages/backend-ai
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          cd packages/backend-ai
          pytest --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./packages/backend-ai/coverage.xml
          flags: backend-ai
          name: backend-ai-coverage

  frontend:
    name: Frontend Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm -C packages/frontend test

      - name: Build
        run: pnpm -C packages/frontend build
        env:
          VITE_API_URL: ""

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: packages/frontend/dist
          retention-days: 7



